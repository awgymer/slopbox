_subdirectory: template

_skip_if_exists:
  - devcontainer.env

devcontainer_root:
  type: str
  default: .devcontainer
  help: Parent directory for the devcontainer files

container_name:
  type: str
  default: claude
  help: Name for the devcontainer (used as the subdirectory name and VS Code display name)

enable_firewall:
  type: bool
  default: true
  help: |
    Restrict container network egress with an iptables/ipset firewall that
    only allows GitHub, Anthropic, and a curated set of domains (plus any in
    extra-allowed-domains). Disable to give the container unrestricted network
    access — the firewall script, its tooling, and the NET_ADMIN/NET_RAW
    capabilities are then omitted entirely.

extra_tools:
  type: yaml
  multiselect: true
  default: []
  help: |
    Optional tools to install in the devcontainer.
    Bundles install multiple tools at once.
  choices:
    "uv (Python package manager)": ["uv"]
    "Java (Temurin 21)": ["java"]
    "Rust (rustup)": ["rust"]
    "nextflow-bundle (java, nextflow, nf-test, uv, nf-core)":
      ["java", "nextflow", "nf-test", "uv", "nf-core"]
    "aws-bundle (node, aws-cdk, awscli)": ["node", "aws-cdk", "awscli"]

# Derived: flat, deduped list of atomic tools to install. Computed once from
# extra_tools and stored in .copier-answers.yml. Templates iterate this.
installed_tools:
  type: json
  default: "{{ extra_tools | sum(start=[]) | unique | list | tojson }}"
  when: false

_message_after_copy: |
  Devcontainer installed to {{ devcontainer_root }}/{{ container_name }}/

  Next steps:
    1. Add devcontainer.env to your .gitignore
    2. Fill in devcontainer.env at your project root with your credentials:
         GH_TOKEN=           # GitHub personal access token
         GIT_AUTHOR_NAME=    # Your name
         GIT_AUTHOR_EMAIL=   # Your email
         GIT_COMMITTER_NAME=
         GIT_COMMITTER_EMAIL=
    3. Open the project in VS Code and select "Reopen in Container"

_message_after_update: |
  Devcontainer updated. Your local changes have been merged with the template.
  devcontainer.env was not modified.
